<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">

<h:head>
    <title>Criar Conta - Horti Vivi</title>
    <link rel="stylesheet" href="style.css" />
</h:head>

<h:body>

    <div class="login-page">

        <div class="login-card">

            <h1>🍓 Criar Conta</h1>
            <p>Cadastre-se para acessar o Horti Vivi</p>

            <h:form>

                <h:messages styleClass="msg-error" />

                <h:outputLabel value="Nome:" />
                <h:inputText styleClass="input"
                             value="#{usuarioBean.usuario.nome}"
                             required="true" />

                <h:outputLabel value="E-mail:" />
                <h:inputText styleClass="input"
                             value="#{usuarioBean.usuario.email}"
                             required="true" />

                <h:outputLabel value="Senha:" />
                <h:inputSecret styleClass="input"
                               value="#{usuarioBean.usuario.senha}"
                               required="true" />

                <h:commandButton styleClass="btn login-btn"
                                 value="Criar Conta"
                                 action="#{usuarioBean.cadastrar}" />

                <br/><br/>

                <h:button styleClass="btn btn-secondary login-btn"
                          value="Já tenho conta"
                          outcome="login.xhtml" />

            </h:form>

        </div>

    </div>

</h:body>
</html>
